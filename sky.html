<!DOCTYPE html>
<html>
<head>
    <title>Suryakumar Yadav</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            text-align: center;

            background-image: url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d");
            background-size: cover;
            background-position: center;

            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        body.show {
            opacity: 1;
        }

        .box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            margin: 50px;
            padding: 30px;
            border-radius: 20px;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00aaff;
            color: white;
            font-size: 16px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Suryakumar Yadav 🏏</h1>

    <img src="sky.jpg">

    <p><b>Age:</b> 33</p>
    <p><b>IPL Matches:</b> 150</p>
    <p><b>Total Runs:</b> 3249</p>
    <p><b>Strike Rate:</b> 143.32</p>
    <p><b>Half Centuries:</b> 21</p>
    <p><b>Total Sixes:</b> 140+</p>
    <p><b>Wife:</b> Devisha Shetty</p>

    <button onclick="goBack()">⬅ Back</button>

</div>

<script>
window.onload = function() {
    document.body.classList.add("show");
}

function goBack() {
    document.body.classList.remove("show");
    setTimeout(function() {
        window.location.href = "index.html";
    }, 400);
}
</script>

</body>
</html>
