<!DOCTYPE html>
<html>
<head>
    <title>Jasprit Bumrah</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            text-align: center;

            background-image: url("https://images.unsplash.com/photo-1505842465776-3d90f6163109");
            background-size: cover;
            background-position: center;

            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        body.show {
            opacity: 1;
        }

        .box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            margin: 50px;
            padding: 30px;
            border-radius: 20px;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00aaff;
            color: white;
            font-size: 16px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Jasprit Bumrah 🏏</h1>

    <img src="bumrah.jpg">

    <p><b>Age:</b> 30</p>
    <p><b>IPL Matches:</b> 133</p>
    <p><b>Total Wickets:</b> 165</p>
    <p><b>Economy Rate:</b> 7.39</p>
    <p><b>Best Bowling:</b> 5/10</p>
    <p><b>Wife:</b> Sanjana Ganesan</p>

    <button onclick="goBack()">⬅ Back</button>

</div>

<script>
window.onload = function() {
    document.body.classList.add("show");
}

function goBack() {
    document.body.classList.remove("show");
    setTimeout(function() {
        window.location.href = "index.html";
    }, 400);
}
</script>

</body>
</html>
