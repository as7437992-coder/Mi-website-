<!DOCTYPE html>
<html>
<head>
    <title>Mumbai Indians Fan Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            background-image: url("https://images.unsplash.com/photo-1540747913346-19e32dc3e97e");
            background-size: cover;
            background-position: center;

            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        body.show {
            opacity: 1;
        }

        .overlay {
            background: rgba(0,0,0,0.7);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .players {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 150px;
            margin: 15px;
            background: rgba(0,0,50,0.7);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
            background: rgba(0,100,255,0.8);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }

        .card p {
            padding: 10px;
            margin: 0;
        }

        input {
            padding: 10px;
            margin: 20px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <h1>Mumbai Indians 💙</h1>

    <!-- Search -->
    <div style="text-align:center;">
        <input type="text" id="search" placeholder="Search player..." onkeyup="searchPlayer()">
    </div>

    <!-- Players -->
    <div class="players">

        <div class="card" onclick="goToPage('rohit.html')">
            <img src="rohit.jpg">
            <p>Rohit Sharma</p>
        </div>

        <div class="card" onclick="goToPage('bumrah.html')">
            <img src="bumrah.jpg">
            <p>Jasprit Bumrah</p>
        </div>

        <div class="card" onclick="goToPage('sky.html')">
            <img src="sky.jpg">
            <p>Suryakumar Yadav</p>
        </div>

    </div>

    <!-- Achievements -->
    <div style="margin: 30px; padding: 25px; text-align: center;
    background: rgba(0,0,50,0.7); border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,150,255,0.7);">

        <h2 style="color:#00aaff;"><b>🏆 Mumbai Indians Achievements</b></h2>

        <p><b>Total IPL Trophies:</b> 5</p>
        <p><b>Final Appearances:</b> 6</p>
        <p><b>Winning Years:</b> 2013, 2015, 2017, 2019, 2020</p>
    </div>

</div>

<script>
window.onload = function() {
    document.body.classList.add("show");
}

function goToPage(page) {
    document.body.classList.remove("show");
    setTimeout(function() {
        window.location.href = page;
    }, 400);
}

function searchPlayer() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let name = cards[i].innerText.toLowerCase();
        cards[i].style.display = name.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
